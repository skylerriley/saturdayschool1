<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Saturday School" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Saturday School - Stableford Golf League</title>
    <script>
      (function(){
        var STORAGE_KEY='pwa-last-standalone';
        var EXPIRY_MS=30*24*60*60*1000;
        var detectedNow=
          window.matchMedia('(display-mode:standalone)').matches||
          navigator.standalone===true;
        if(detectedNow){localStorage.setItem(STORAGE_KEY,Date.now().toString());}
        var lastSeen=parseInt(localStorage.getItem(STORAGE_KEY)||'0');
        var isPWA=detectedNow||(Date.now()-lastSeen<EXPIRY_MS);
        if(isPWA){document.documentElement.classList.add('is-pwa');}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.__VAPID_PUBLIC_KEY__ = "%VITE_VAPID_PUBLIC_KEY%";
    </script>
  </body>
</html>
